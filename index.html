<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inteligencia Competitiva — Network Planning</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f7f1;color:#1a1a1a;font-size:13px}
.wrap{max-width:1140px;margin:0 auto;padding:16px 20px}
.hdr{background:#004A23;border-radius:8px;padding:14px 20px;margin-bottom:12px;border:1px solid #003018;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-left h1{font-size:10px;font-weight:600;color:#8CD400;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.hdr-left h2{font-size:19px;font-weight:700;color:#fff}
.hdr-right{font-size:11px;color:rgba(140,212,0,.85);text-align:right;line-height:1.5}
.tabs{display:flex;gap:3px;margin-bottom:12px}
.tab{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #b8dfc4;background:#fff;color:#00853F}
.tab.active{background:#00853F;color:#fff;border-color:#004A23}
.tab:hover:not(.active){background:#e6f5ec;border-color:#00853F}
.panel{display:none}.panel.active{display:block}

/* EXEC */
.exec-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.al-block{background:#fff;border-radius:10px;border:1px solid #e0e0d8;overflow:hidden}
.al-hdr{padding:12px 16px;display:flex;align-items:center;gap:10px}
.al-logo{font-size:13px;font-weight:800;padding:4px 10px;border-radius:5px;letter-spacing:.04em}
.al-logo.am{background:#003087;color:#fff}
.al-logo.y4{background:#6B2D8B;color:#fff}
.al-title{font-size:14px;font-weight:600}
.al-sub{font-size:11px;color:#888;margin-top:1px}
.month-cards{display:grid;gap:0}
.mc{padding:14px 16px;border-top:1px solid #f0f0e8;display:grid;grid-template-columns:72px 1fr;gap:10px;align-items:start}
.mc-month{font-size:22px;font-weight:800;line-height:1}
.mc-month.jul{color:#00853F}.mc-month.ago{color:#8CD400}.mc-month.sep{color:#FF4D29}.mc-month.oct{color:#004A23}
.mc-stats{display:flex;gap:12px;flex-wrap:wrap}
.stat{text-align:center}
.stat-v{font-size:18px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:#888;margin-top:2px}
.mc-top{font-size:11px;color:#555;margin-top:6px;font-style:italic}
.mc-new{font-size:10px;background:#8CD400;color:#003018;padding:1px 6px;border-radius:3px;font-weight:600;margin-left:4px}
.insight-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ins{background:#fff;border-radius:8px;border:1px solid #e0e0d8;padding:12px 14px;border-left:3px solid}
.ins h4{font-size:12px;font-weight:600;margin-bottom:4px}
.ins p{font-size:11px;color:#555;line-height:1.5}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:14px 0}
.chart-box{background:#fff;border-radius:10px;border:1px solid #d0e8d4;padding:14px 16px}
.chart-box h3{font-size:12px;font-weight:700;color:#004A23;margin-bottom:2px;letter-spacing:.03em}
.chart-box p{font-size:11px;color:#aaa;margin-bottom:10px}
.chart-canvas-wrap{position:relative;width:100%;height:220px}
.ins.red{border-left-color:#FF4D29}.ins.amb{border-left-color:#8CD400}.ins.grn{border-left-color:#004A23}

/* ROUTES */
.fbar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.fb{padding:4px 11px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#666}
.fb.on{background:#00853F;color:#fff;border-color:#004A23;font-weight:500}
.fb-sep{width:1px;height:18px;background:#e0e0d8;margin:0 3px}
.legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;font-size:11px;color:#666}
.ld{display:flex;align-items:center;gap:4px}
.ldot{width:12px;height:12px;border-radius:2px}
.rc{background:#fff;border-radius:8px;border:1px solid #e0e0d8;margin-bottom:8px;overflow:hidden}
.rc-hdr{display:flex;align-items:center;gap:7px;padding:9px 12px;cursor:pointer;flex-wrap:wrap}
.rc-hdr:hover{background:#f0f9f2}
.rc-code{font-size:13px;font-weight:700;font-family:monospace;min-width:64px}
.bd{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}
.bd-am{background:#e8f0fd;color:#003087;border:1px solid #b8d0f5}
.bd-y4{background:#f0e8f8;color:#6B2D8B;border:1px solid #d4b3e8}
.bd-sig{background:#FF4D29;color:#fff}.bd-mod{background:#8CD400;color:#003018}.bd-men{background:#00853F;color:#fff}
.rc-anl{font-size:10px;color:#aaa}
.chev{font-size:11px;color:#bbb;transition:transform .2s}
.rc.open .chev{transform:rotate(180deg)}
.rc-body{display:none;padding:0 12px 12px;border-top:1px solid #f5f5f0}
.rc.open .rc-body{display:block}
.rc.open{border-color:#00853F;border-width:1px}
.rc-metrics{display:flex;gap:8px;margin:10px 0 8px;flex-wrap:wrap}
.met{background:#f5f5f0;border-radius:6px;padding:6px 10px;text-align:center;min-width:60px}
.met-v{font-size:16px;font-weight:700}
.met-l{font-size:10px;color:#888;margin-top:1px}
.met.red .met-v{color:#FF4D29}.met.amb .met-v{color:#EF9F27}.met.grn .met-v{color:#166534}.met.blu .met-v{color:#185FA5}
.rc-detail{font-size:11px;color:#666;margin-bottom:8px;line-height:1.5}
/* GRID */
.day-grid{width:100%}
.dg-wrap{overflow-x:auto;border-radius:6px;border:0.5px solid #cce5cc}
table.dg{border-collapse:collapse;width:100%;min-width:400px;table-layout:fixed}
table.dg th,table.dg td{border:0.5px solid #ddd;font-size:10px;text-align:center;padding:0;height:21px;vertical-align:middle}
table.dg thead th{background:#e8f5e8;font-weight:500;font-size:10px;color:#888;height:24px}
th.bk{text-align:left;padding-left:5px;width:56px;background:#e8f5e8;font-size:9px;color:#aaa;font-weight:400}
th.dc{width:calc((100%-56px)/7)}
td.bk-c{font-size:9px;text-align:left;padding-left:5px;color:#666;background:#f8fcf8;white-space:nowrap;font-weight:500}
td.empty{background:#fff}
td.s-sig{background:#FF4D29}
td.s-mod{background:#8CD400}
td.s-men{background:#00853F}
td.s-inc{background:#F6F2B1}
.sym{font-size:10px;font-weight:700;color:#fff}.s-mod .sym,.s-inc .sym{color:#003018}
/* TABLES */
.abar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.abb{padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid #ddd;background:#fff;color:#666;font-weight:500}
.abb.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.abb:hover:not(.on){background:#f0f0ea}
.asec{margin-bottom:20px}
.asec-hdr{display:flex;align-items:center;gap:10px;padding:10px 0 8px;border-bottom:2px solid #1a1a1a;margin-bottom:10px}
.av3{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.asec-name{font-size:15px;font-weight:700}
.asec-sub{font-size:11px;color:#aaa;margin-top:1px}
.rg{background:#fff;border:1px solid #e0e0d8;border-radius:8px;margin-bottom:8px;overflow:hidden}
.rg-hdr{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#fafaf7;border-bottom:1px solid #f0f0e8;flex-wrap:wrap}
.rg-code{font-size:12px;font-weight:700;font-family:monospace}
.rg-months{font-size:10px;color:#aaa}
table.ft{border-collapse:collapse;width:100%}
table.ft thead th{background:#f5f5f0;font-size:10px;font-weight:600;padding:6px 10px;text-align:left;border-bottom:1px solid #e0e0d8;color:#666;white-space:nowrap}
table.ft tbody tr:hover td{background:#fafaf7}
table.ft td{font-size:12px;padding:6px 10px;border-bottom:0.5px solid #f5f5f0;vertical-align:middle}
table.ft tr:last-child td{border-bottom:none}
.ft-num{font-family:monospace;font-weight:600;color:#1a1a1a;min-width:70px}
.ft-days{color:#555;min-width:130px}
.ft-sch{font-family:monospace;font-size:11px;color:#1a1a1a;font-weight:500;white-space:nowrap}
.ft-inc td{background:#f0fdf4!important}
.ft-inc .ft-num::before{content:"▲ ";color:#166534;font-size:9px}
.bk-mat{background:#e0f2fe;color:#0369a1;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}
.bk-med{background:#fef9c3;color:#a16207;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}
.bk-ves{background:#fce7f3;color:#be185d;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}
.bk-noc{background:#e0e7ff;color:#4338ca;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap}

.hdr-chips{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0}
.hc{text-align:center;min-width:42px;background:#f5f5f0;border-radius:5px;padding:3px 6px;line-height:1.2}
.hc-v{font-size:13px;font-weight:700;line-height:1}
.hc-l{font-size:9px;color:#aaa;margin-top:1px;white-space:nowrap}
.hc.neg .hc-v{color:#FF4D29}
.hc.pos .hc-v{color:#00853F}
.hc.blu .hc-v{color:#003087}
.viva-block{margin-top:10px;background:#f0f9f2;border-radius:7px;border:1px solid #c5e8cc;padding:10px 12px}
.viva-block-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.viva-logo-tag{font-size:10px;font-weight:800;background:#00853F;color:#fff;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.viva-block-title{font-size:11px;font-weight:600;color:#004A23}
.viva-freq-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.vf{text-align:center;background:#fff;border:1px solid #c5e8cc;border-radius:5px;padding:4px 8px;min-width:52px}
.vf-v{font-size:14px;font-weight:700;color:#004A23}
.vf-l{font-size:9px;color:#888}
.viva-kpis{display:flex;gap:8px;flex-wrap:wrap}
.vk{background:#fff;border:1px solid #c5e8cc;border-radius:5px;padding:4px 10px;text-align:center;min-width:55px}
.vk-v{font-size:13px;font-weight:700;color:#004A23}
.vk-l{font-size:9px;color:#888;margin-top:1px}
.viva-noopera{font-size:11px;color:#aaa;padding:6px 0;font-style:italic}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>

      tw:    [63, 42, 27, 12, 12, 11, 11, 11, 7, 5],
      lw:    [70, 49, 28, 14, 14, 14, 14, 14, 9, 7]
    },
    { id:'chartAMSep', base:'#003087', red:'#1565C0',
      routes:["MEXMTY", "GDLMEX", "CUNMEX", "MEXVER", "MEXVSA", "MEXTGZ", "MEXPVR", "MEXSLP", "MEXTAM", "MEXMZT"],
      tw:    [80, 78, 74, 35, 34, 28, 28, 28, 27, 14],
      lw:    [98, 95, 103, 47, 42, 39, 35, 33, 32, 20]
    },
    { id:'chartY4Sep', base:'#6B2D8B', red:'#9C27B0',
      routes:["GDLTIJ", "GDLMTY", "MEXTIJ", "CULGDL", "HMOTIJ", "GDLPVR", "MTYQRO", "MTYTLC", "BJXMTY", "CUUTIJ"],
      tw:    [54, 41, 28, 20, 17, 13, 11, 10, 10, 10],
      lw:    [56, 46, 35, 21, 18, 14, 14, 14, 14, 10]
    },
  ];

  chartDefs.forEach(d=>{
    const canvas = document.getElementById(d.id);
    if(!canvas) return;
    const wow    = d.tw.map((t,i)=>d.lw[i]-t);
    const pctArr = wow.map((w,i)=>((-w/d.lw[i])*100).toFixed(1));

    const topPlugin = {
      id:'topLbl',
      afterDatasetsDraw(chart){
        const {ctx,scales:{x,y}} = chart;
        ctx.save();
        ctx.font='bold 9px sans-serif';
        ctx.textAlign='center';
        ctx.textBaseline='bottom';
        d.routes.forEach((_,i)=>{
          const m0=chart.getDatasetMeta(0), m1=chart.getDatasetMeta(1);
          const b0=m0.data[i], b1=m1.data[i];
          const topY=Math.min(b0.y,b1.y)-2;
          ctx.fillStyle=d.red;
          ctx.fillText('-'+pctArr[i]+'%', b0.x, topY);
          if(b0.height>12){
            ctx.font='bold 9px sans-serif';
            ctx.fillStyle='#fff';
            ctx.textBaseline='middle';
            ctx.fillText(d.tw[i], b0.x, b0.y+b0.height/2);
            ctx.textBaseline='bottom';
          }
        });
        ctx.restore();
      }
    };

    new Chart(canvas, {
      type:'bar',
      plugins:[topPlugin],
      data:{
        labels: d.routes,
        datasets:[
          { label:'Base', data:d.tw, backgroundColor:d.base, stack:'s' },
          { label:'Reducción', data:wow, backgroundColor:d.red, stack:'s' },
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        animation:{duration:500},
        layout:{padding:{top:22,right:4,bottom:2,left:2}},
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{
            title:c=>c[0].label,
            label:c=>{
              const i=c.dataIndex;
              if(c.datasetIndex===0) return `TW: ${d.tw[i]} frec`;
              return `LW: ${d.lw[i]} frec · Δ: -${wow[i]} (-${pctArr[i]}%)`;
            }
          }}
        },
        scales:{
          x:{stacked:true,ticks:{font:{size:9},maxRotation:45,minRotation:45,autoSkip:false,color:'#555'},grid:{display:false}},
          y:{stacked:true,beginAtZero:true,ticks:{font:{size:9},stepSize:20,color:'#555'},grid:{color:'rgba(0,74,35,.06)'},
             title:{display:true,text:'Frecuencias',font:{size:9},color:'#888'}}
        }
      }
    });
  });
} // end buildCharts

function buildGrid(r){
  const s = r.level==='sig'?'s-sig':r.level==='mod'?'s-mod':'s-men';
  let rows='';
  BANKS.forEach(bk=>{
    const cancel = r.grid?.[bk]||[];
    const incr   = r.inc?.[bk]||[];
    let cells='';
    for(let d=1;d<=7;d++){
      if(incr.includes(d)) cells+=`<td class="s-inc"><div class="sym">▲</div></td>`;
      else if(cancel.includes(d)) cells+=`<td class="${s}"><div class="sym">✕</div></td>`;
      else cells+=`<td class="empty"></td>`;
    }
    rows+=`<tr><td class="bk-c">${BK_LBL[bk]}</td>${cells}</tr>`;
  });
  return `<div class="dg-wrap"><table class="dg">
    <thead><tr>
      <th class="bk"></th>
      <th class="dc">D1<br><span style="font-weight:400;color:#ccc">Lun</span></th>

      <th class="dc">D7<br><span style="font-weight:400;color:#ccc">Dom</span></th>

}

            <div style="font-size:10px;color:#666;margin-bottom:4px;font-weight:500">Frecuencias semanales</div>
            <div class="viva-freq-row">${freqCells}</div>
            <div style="font-size:10px;color:#666;margin:6px 0 4px;font-weight:500">Load Factor</div>
            <div class="viva-freq-row">${lfCells}</div>
            <div style="font-size:10px;color:#666;margin:6px 0 4px;font-weight:500">Indicadores clave (SEP)</div>
            <div class="viva-kpis">
              <div class="vk"><div class="vk-v">${vd.ms??'—'}%</div><div class="vk-l">Mkt Share</div></div>
              <div class="vk"><div class="vk-v" style="color:${cmColor}">${vd.cm??'—'}%</div><div class="vk-l">CM%</div></div>
              ${vd.nrs != null ? `<div class="vk"><div class="vk-v">$${vd.nrs}</div><div class="vk-l">NRS/Pax</div></div>` : ''}
            </div>
          </div>`;
      } else if(vd && !vd.op){
        vivaBlock = `<div class="viva-block"><div class="viva-block-hdr"><span class="viva-logo-tag">VIVA</span><span class="viva-block-title">Posición Viva en esta ruta</span></div><div class="viva-noopera">Viva no opera esta ruta — oportunidad de análisis</div></div>`;
      }

      html+=`<div class="rc" id="rc-${r.code}">
        <div class="rc-hdr" onclick="toggle('${r.code}')">
          <span class="rc-code">${r.code}</span>
          <span class="bd ${airCls}">${r.airline}</span>
          <span class="bd ${lvlCls}">${lbl}</span>
          <span style="font-size:10px;color:#aaa">${r.months}</span>
          <span class="rc-anl">${anlText}</span>
          <div class="hdr-chips">
            <div class="hc blu"><div class="hc-v">${r.tw??'—'}</div><div class="hc-l">TW</div></div>
            <div class="hc"><div class="hc-v" style="color:#555">${r.lw??'—'}</div><div class="hc-l">LW</div></div>
            <div class="hc ${r.df!=null&&r.df<0?'neg':'pos'}"><div class="hc-v">${r.df!=null?(r.df>0?'+':'')+r.df:'—'}</div><div class="hc-l">Δ Vuelos</div></div>
            <div class="hc ${r.pct!=null&&r.pct<0?'neg':'pos'}"><div class="hc-v">${r.pct!=null?(r.pct>0?'+':'')+r.pct+'%':'—'}</div><div class="hc-l">Var%</div></div>
          </div>
          <span class="chev">▾</span>
        </div>
        <div class="rc-body">
          <div class="rc-metrics">
            <div class="met blu"><div class="met-v">${r.tw??'—'}</div><div class="met-l">TW frec</div></div>
            <div class="met"><div class="met-v" style="color:#666">${r.lw??'—'}</div><div class="met-l">LW frec</div></div>
            <div class="met red"><div class="met-v" style="color:${dfColor}">${r.df!=null?(r.df>0?'+':'')+r.df:'—'}</div><div class="met-l">Δ Vuelos</div></div>
            <div class="met"><div class="met-v" style="color:${dfColor}">${r.pct!=null?pctSign+r.pct+'%':'—'}</div><div class="met-l">Variación</div></div>
          </div>
          <div class="rc-detail">${r.detail}</div>
          ${buildGrid(r)}
          ${vivaBlock}
        </div>
      </div>`;
    });
  });

  document.getElementById('routes-list').innerHTML = html||'<p style="color:#aaa;padding:20px;text-align:center">Sin resultados para este filtro</p>';
}

function toggle(code){
  document.getElementById('rc-'+code)?.classList.toggle('open');
}

// ── ANALYST DETAIL ────────────────────────────────────────────────────────────
const AV_COLORS={David:'background:#dbeafe;color:#1e40af',Erick:'background:#dcfce7;color:#166534',Fanny:'background:#fef3c7;color:#92400e',Fernanda:'background:#fee2e2;color:#b91c1c',Juan:'background:#ede9fe;color:#5b21b6',Lilian:'background:#d1fae5;color:#065f46',Loyda:'background:#fce7f3;color:#be185d',Lucero:'background:#e0f2fe;color:#0369a1','—':'background:#f1f0eb;color:#888'};
const ALL_ANALYSTS = ['David','Erick','Fanny','Fernanda','Juan','Lilian','Loyda'];
let curAnalyst='all';

function buildTables(){
  const bar = document.getElementById('abar');
  if(bar.querySelectorAll('button').length===0){
    const allBtn=document.createElement('button');
    allBtn.className='abb on'; allBtn.id='ab-all'; allBtn.textContent='Todos';
    allBtn.onclick=()=>filterAnl('all'); bar.appendChild(allBtn);
    ALL_ANALYSTS.forEach(a=>{
      const b=document.createElement('button');
      b.className='abb'; b.id='ab-'+a; b.textContent=a;
      b.onclick=()=>filterAnl(a); bar.appendChild(b);
    });
  }
  renderAnalystDetail();
}

function filterAnl(a){
  curAnalyst=a;
  document.querySelectorAll('.abb').forEach(x=>x.classList.remove('on'));
  document.getElementById('ab-'+a)?.classList.add('on');
  renderAnalystDetail();
}

function bankClass(bank){
  if(bank==='Matutino') return 'bk-mat';
  if(bank==='Medio día') return 'bk-med';
  if(bank==='Vespertino') return 'bk-ves';
  if(bank==='Nocturno') return 'bk-noc';
  return '';
}

function renderAnalystDetail(){
  const analysts = curAnalyst==='all' ? ALL_ANALYSTS : [curAnalyst];
  const byA={};
  ROUTES.forEach(r=>{
    const a=r.analyst||'—';
    if(!byA[a]) byA[a]=[];
    byA[a].push(r);
  });

  const LVL_LABEL={sig:'Significativo',mod:'Moderado',men:'Menor'};
  const LVL_COLOR={sig:'#FF4D29',mod:'#8CD400',men:'#00853F'};

  let html='';
  analysts.forEach(analyst=>{
    const rs=(byA[analyst]||[]).sort((a,b)=>a.code.localeCompare(b.code));
    if(!rs.length) return;
    const initials=analyst.slice(0,2).toUpperCase();
    const avStyle=AV_COLORS[analyst]||AV_COLORS['—'];
    const totalRoutes=rs.length;

    let routeBlocks='';
    rs.forEach(r=>{
      const fls = FLIGHTS[r.code]||[];
      if(!fls.length) return;
      const airCls=r.airline==='AM'?'bd-am':'bd-y4';
      const lvlColor=LVL_COLOR[r.level]||'#888';
      const lvlLbl=LVL_LABEL[r.level]||r.level;

      let rows='';
      fls.forEach(f=>{
        const bkCls=bankClass(f.bank);
        const trCls=f.t==='inc'?'ft-inc':'';
        rows+=`<tr class="${trCls}">
          <td class="ft-num">${f.num}</td>
          <td class="ft-days">${f.days}</td>
          <td class="ft-sch">${f.sch}</td>
          <td><span class="${bkCls}">${f.bank}</span></td>
        </tr>`;
      });

      routeBlocks+=`<div class="rg">
        <div class="rg-hdr">
          <span class="rg-code">${r.code}</span>
          <span class="bd ${airCls}">${r.airline}</span>
          <span class="bd" style="background:${lvlColor};color:#fff;font-size:10px;padding:2px 6px;border-radius:3px">${lvlLbl}</span>
          <span class="rg-months">${r.months}</span>
        </div>
        <table class="ft">
          <thead><tr>
            <th>Vuelo</th><th>Días</th><th>Horario</th><th>Banco</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    });

    if(!routeBlocks) return;

    html+=`<div class="asec">
      <div class="asec-hdr">
        <div class="av3" style="${avStyle}">${initials}</div>
        <div>
          <div class="asec-name">${analyst}</div>
          <div class="asec-sub">${totalRoutes} ruta${totalRoutes!==1?'s':''} asignadas con cambios</div>
        </div>
      </div>
      ${routeBlocks}
    </div>`;
  });

  document.getElementById('analyst-detail').innerHTML=html||'<p style="color:#aaa;padding:20px;text-align:center">Sin datos para este analista</p>';
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildExec();
</script>
</body>
</html>
